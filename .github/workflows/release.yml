name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact_name: puny-x86_64-linux.tar.gz
            binary_name: "puny"

          - os: ubuntu-latest
            target: aarch64-linux
            artifact_name: puny-aarch64-linux.tar.gz
            binary_name: "puny"

          - os: macos-latest
            target: x86_64-macos
            artifact_name: puny-x86_64-macos.tar.gz
            binary_name: "puny"

          - os: macos-14 # M1 runner
            target: aarch64-macos
            artifact_name: puny-aarch64-macos.tar.gz
            binary_name: "puny"

          - os: windows-latest
            target: x86_64-windows-gnu
            artifact_name: puny-x86_64-windows.zip
            binary_name: "puny.exe"

    steps:
      - uses: actions/checkout@v4

      # Zig setup
      - name: Set up Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      # Install cross-compilation deps for aarch64-linux
      - name: Install Linux aarch64 deps (cross)
        if: matrix.target == 'aarch64-linux'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: |
          zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }}

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          cp zig-out/bin/${{ matrix.binary_name }} release/
          cp README.md release/
          cp LICENSE release/
          cd release
          tar -czf ../${{ matrix.artifact_name }} *

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy zig-out\bin\${{ matrix.binary_name }} release\
          copy README.md release\
          copy LICENSE release\
          Compress-Archive -Path release\* -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  publish-release:
    needs: build
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}

            ## Download
            Download the appropriate binary for your platform below.

            ## Installation
            1. Download the archive for your platform
            2. Extract the binary
            3. Add to your PATH or run directly

            ## Checksums
            See the attached checksums file for verification.
          files: |
            artifacts/**/*
          draft: true
