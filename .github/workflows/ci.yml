name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          zig-version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Run regression tests
        shell: pwsh
        run: ./scripts/test-regression.ps1
