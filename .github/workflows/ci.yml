name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run regression tests
        shell: pwsh
        run: ./scripts/test-regression.ps1
