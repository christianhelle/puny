name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

  test-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check zig fmt
        run: zig fmt --check src/

      - name: Run regression tests
        run: zig build test-regression
